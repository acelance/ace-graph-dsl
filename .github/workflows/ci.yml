name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "ace-graph-dsl-backend/**"
      - "ace-graph-dsl-ui/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/publish.yml"
  push:
    branches:
      - main
    paths:
      - "ace-graph-dsl-backend/**"
      - "ace-graph-dsl-ui/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/publish.yml"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify backend
        working-directory: ace-graph-dsl-backend
        run: mvn -B clean verify

  ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ace-graph-dsl-ui/package-lock.json

      - name: Install dependencies
        working-directory: ace-graph-dsl-ui
        run: npm ci

      - name: Build UI
        working-directory: ace-graph-dsl-ui
        run: npm run build
